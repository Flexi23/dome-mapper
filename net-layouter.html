<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Net Layouter</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #ccc; font-family: system-ui, sans-serif; overflow: hidden; }
canvas { display: block; }
#ui {
	position: fixed; top: 12px; left: 12px;
	background: rgba(20, 20, 40, 0.9); padding: 12px 16px; border-radius: 8px;
	font-size: 13px; line-height: 1.6; z-index: 10; min-width: 240px;
	max-height: calc(100vh - 24px); overflow-y: auto;
}
#ui label { display: block; margin: 4px 0; }
#ui select, #ui input[type=range] { width: 100%; }
#ui .row { display: flex; align-items: center; gap: 8px; }
#ui .val { min-width: 32px; text-align: right; font-variant-numeric: tabular-nums; }
#ui button { width: 100%; margin: 3px 0; padding: 4px 8px; cursor: pointer; border-radius: 4px; border: 1px solid #555; background: #2a2a4a; color: #ccc; font-size: 12px; }
#ui button:hover { background: #3a3a6a; }
#ui .btn-row { display: flex; gap: 6px; }
#ui .btn-row button { flex: 1; }
#ui .label-row { display: flex; justify-content: space-between; align-items: center; margin: 4px 0 2px; }
#ui .label-row span { display: flex; gap: 4px; align-items: center; }
#ui .label-row button { width: auto; margin: 0; padding: 1px 6px; font-size: 11px; line-height: 1.4; }
#ui hr { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 8px 0; }
#score { color: #8f8; margin-top: 6px; }
#tooltip {
	position: fixed; pointer-events: none; z-index: 20;
	background: rgba(10, 10, 30, 0.92); color: #eee; padding: 6px 10px;
	border-radius: 5px; font-size: 12px; display: none; white-space: nowrap;
}
</style>
</head>
<body>
<div id="ui">
	<label>Geometry:
		<select id="geo-select"></select>
	</label>

	<hr>

	<label style="display:none">Preset:
		<select id="preset-select"></select>
	</label>

	<hr>

	<div class="label-row" style="margin-bottom:2px"><span>Poles:</span></div>
	<div class="row" style="margin:2px 0">
		<span style="flex:1; font-size:12px">N: <span id="north-pole-label" style="color:#e66">—</span></span>
		<button id="btn-edit-north" style="width:auto; padding:1px 8px; font-size:11px" title="Edit North Pole">✎ N</button>
	</div>
	<div class="row" style="margin:2px 0">
		<span style="flex:1; font-size:12px">S: <span id="south-pole-label" style="color:#68f">—</span></span>
		<button id="btn-edit-south" style="width:auto; padding:1px 8px; font-size:11px" title="Edit South Pole">✎ S</button>
		<button id="btn-edit-meridian" style="width:auto; padding:1px 8px; font-size:11px" title="Move null meridian along equator">0°</button>
	</div>

	<hr>

	<div class="label-row">
		<span>Paper format:</span>
		<span>
			<button id="btn-delete-custom" style="display:none" title="Delete custom format">🗑</button>
			<button id="btn-save-custom" title="Create new custom format">＋ New</button>
		</span>
	</div>
	<select id="paper-fmt"></select>

	<div class="row" style="margin-top:6px">
		<label style="flex:1; margin:0">Orientation:</label>
		<select id="orientation" style="width:auto">
			<option value="landscape">Landscape</option>
			<option value="portrait">Portrait</option>
		</select>
	</div>

	<div class="row" style="margin-top:4px">
		<label style="flex:1; margin:0">Margin:</label>
		<input type="range" id="margin-slider" min="0" max="20" step="0.5" value="0" style="flex:2">
		<span class="val" id="margin-val">0 mm</span>
	</div>

	<hr>

	<div class="btn-row">
		<button id="btn-flip-h">↔ Flip H</button>
		<button id="btn-flip-v">↕ Flip V</button>
	</div>
	<button id="btn-glue-tab">✂ Edit Glue Tabs</button>
	<div class="btn-row">
		<button id="btn-export-clip" title="Copy layout to clipboard">📋 Copy</button>
		<button id="btn-import-clip" title="Paste layout from clipboard">📥 Paste</button>
	</div>
	<div id="score"></div>
</div>
<div id="tooltip"></div>
<canvas id="c"></canvas>

<script src="geometry-presets.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════════════════════════════════════
// Global state
// ═══════════════════════════════════════════════════════════════════════

let geo = null;  // current geometry object
let currentLayout = null;
let hoveredEdge = null;
let hoveredFace = -1;
let boundaryEdges = [];
let glueTabMode = false;
let tabOwnership = {};
let vertexMap = null;
let poleEditMode = null;   // null | 'north' | 'south'
let merEditMode = false;   // true when editing null meridian
let hoveredSnap = null;    // { type, id/face/vertexId, positions }

const undoStack = [];
const redoStack = [];
let historyIndex = 0;

// ── DOM refs ──
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const geoSelect = document.getElementById('geo-select');
const presetSelect = document.getElementById('preset-select');
const paperFmt = document.getElementById('paper-fmt');
const orientationSelect = document.getElementById('orientation');
const marginSlider = document.getElementById('margin-slider');
const marginVal = document.getElementById('margin-val');
const scoreDiv = document.getElementById('score');
const tooltip = document.getElementById('tooltip');
const northPoleLabel = document.getElementById('north-pole-label');
const southPoleLabel = document.getElementById('south-pole-label');

// ═══════════════════════════════════════════════════════════════════════
// Paper format & aspect helpers
// ═══════════════════════════════════════════════════════════════════════

function getMarginMM() { return parseFloat(marginSlider.value) || 0; }

function getSelectedPaperDims() {
	const key = paperFmt.value;
	const idx = parseInt(key);
	if (idx >= 0 && idx < PAPER_FORMATS.length) {
		return { width: PAPER_FORMATS[idx].width, height: PAPER_FORMATS[idx].height };
	}
	if (!geo) return { width: 297, height: 210 };
	const customs = loadCustomLayouts();
	if (customs[key] && customs[key].width && customs[key].height) {
		return { width: Math.max(customs[key].width, customs[key].height), height: Math.min(customs[key].width, customs[key].height) };
	}
	return { width: 297, height: 210 };
}

function getEffectiveAspect() {
	const dims = getSelectedPaperDims();
	const m = getMarginMM();
	const isPortrait = orientationSelect.value === 'portrait';
	let w = isPortrait ? dims.height : dims.width;
	let h = isPortrait ? dims.width : dims.height;
	const ew = Math.max(w - 2 * m, 1);
	const eh = Math.max(h - 2 * m, 1);
	return ew / eh;
}

// ═══════════════════════════════════════════════════════════════════════
// Custom layouts (persisted in localStorage per geometry)
// ═══════════════════════════════════════════════════════════════════════

function loadCustomLayouts() {
	if (!geo) return {};
	try { return JSON.parse(localStorage.getItem(geo.storageKey)) || {}; } catch { return {}; }
}
function saveCustomLayouts(obj) {
	if (!geo) return;
	localStorage.setItem(geo.storageKey, JSON.stringify(obj));
}

// ═══════════════════════════════════════════════════════════════════════
// Layout helpers
// ═══════════════════════════════════════════════════════════════════════

function edgeKey(i, j) { return Math.min(i, j) + '-' + Math.max(i, j); }
function cloneTabOwnership() { return Object.assign({}, tabOwnership); }
function seedFromParents(pp) { return pp.indexOf(-1); }

function cloneLayout(layout) {
	return {
		res: layout.res.map(r => r ? { x: r.x, y: r.y, r: r.r } : r),
		placed: layout.placed.slice(),
		parent: layout.parent.slice(),
		count: layout.count,
		seed: layout.seed,
		mirrored: layout.mirrored || false,
		label: layout.label || '',
		angle: layout.angle || 0,
		lonOffset: layout.lonOffset || 0,
		northPole: layout.northPole ? Object.assign({}, layout.northPole) : null,
		southPole: layout.southPole ? Object.assign({}, layout.southPole) : null,
		tabOwnershipSnapshot: cloneTabOwnership()
	};
}

// ═══════════════════════════════════════════════════════════════════════
// Vertex Map & Pole System
// ═══════════════════════════════════════════════════════════════════════

function rebuildVertexMap() {
	if (!geo) { vertexMap = null; return; }
	const mirrored = currentLayout ? currentLayout.mirrored : false;
	const nFaces = geo.nFaces;
	let maxSides = 0;
	for (let i = 0; i < nFaces; i++) maxSides = Math.max(maxSides, geo.nSides(i));

	const total = nFaces * maxSides;
	const uf = new Int32Array(total).fill(-1);

	function find(x) {
		let r = x;
		while (uf[r] >= 0) r = uf[r];
		while (x !== r) { const nx = uf[x]; uf[x] = r; x = nx; }
		return r;
	}
	function union(a, b) {
		a = find(a); b = find(b);
		if (a === b) return;
		if (uf[a] > uf[b]) { const t = a; a = b; b = t; }
		uf[a] += uf[b]; uf[b] = a;
	}
	function vkey(face, vi) { return face * maxSides + vi; }

	for (let i = 0; i < nFaces; i++) {
		for (const j of geo.adj[i]) {
			if (j <= i) continue;
			const ki = geo.edgeIdx(i, j), kj = geo.edgeIdx(j, i);
			const si = geo.edgeSlot(i, ki, mirrored);
			const sj = geo.edgeSlot(j, kj, mirrored);
			const ni = geo.nSides(i), nj = geo.nSides(j);
			union(vkey(i, si), vkey(j, (sj + 1) % nj));
			union(vkey(i, (si + 1) % ni), vkey(j, sj));
		}
	}

	const classMap = new Map();
	for (let i = 0; i < nFaces; i++) {
		const n = geo.nSides(i);
		for (let k = 0; k < n; k++) {
			const root = find(vkey(i, k));
			if (!classMap.has(root)) classMap.set(root, []);
			classMap.get(root).push({ face: i, vi: k });
		}
	}

	const vertexClasses = [...classMap.values()];
	const vertexIdArr = new Int32Array(total).fill(-1);
	const dirs = [];

	vertexClasses.forEach((cls, id) => {
		for (const { face, vi } of cls) vertexIdArr[vkey(face, vi)] = id;
		let sx = 0, sy = 0, sz = 0;
		for (const { face } of cls) {
			sx += geo.c3[face][0]; sy += geo.c3[face][1]; sz += geo.c3[face][2];
		}
		const l = Math.sqrt(sx * sx + sy * sy + sz * sz);
		dirs.push(l > 0 ? [sx / l, sy / l, sz / l] : [0, 1, 0]);
	});

	vertexMap = { vertexClasses, vertexId: vertexIdArr, maxSides, dirs, vkey };
}

function getPolePositions2D(pole, layout) {
	if (!pole || !layout || !geo) return [];
	const { res, placed } = layout;
	const positions = [];
	if (pole.type === 'center') {
		const f = pole.face;
		if (f >= 0 && f < geo.nFaces && placed[f])
			positions.push({ x: res[f].x, y: res[f].y, face: f });
	} else if (pole.type === 'vertex' && vertexMap) {
		const vid = pole.vertexId;
		if (vid >= 0 && vid < vertexMap.vertexClasses.length) {
			const seen = new Set();
			for (const { face, vi } of vertexMap.vertexClasses[vid]) {
				if (!placed[face]) continue;
				const verts = geo.polyVerts(res[face].x, res[face].y, res[face].r, face, layout.mirrored);
				const px = verts[vi].x, py = verts[vi].y;
				const pk = Math.round(px * 1e4) + ',' + Math.round(py * 1e4);
				if (!seen.has(pk)) { seen.add(pk); positions.push({ x: px, y: py, face }); }
			}
		}
	}
	return positions;
}

function resolvePole(stored) {
	if (!stored || !geo || !vertexMap) return null;
	if (stored.type === 'center') {
		if (stored.face !== undefined && stored.face >= 0 && stored.face < geo.nFaces)
			return { type: 'center', face: stored.face };
		if (stored.dir) {
			let best = -1, bestDot = -Infinity;
			for (let i = 0; i < geo.nFaces; i++) {
				const d = dot3(stored.dir, geo.c3[i]);
				if (d > bestDot) { bestDot = d; best = i; }
			}
			return { type: 'center', face: best };
		}
		return null;
	}
	if (stored.type === 'vertex' && stored.dir) {
		let best = -1, bestDot = -Infinity;
		for (let v = 0; v < vertexMap.dirs.length; v++) {
			const d = dot3(stored.dir, vertexMap.dirs[v]);
			if (d > bestDot) { bestDot = d; best = v; }
		}
		return { type: 'vertex', vertexId: best, dir: vertexMap.dirs[best] };
	}
	return null;
}

function serializePole(pole) {
	if (!pole || !geo) return null;
	if (pole.type === 'center')
		return { type: 'center', face: pole.face, dir: geo.c3[pole.face].slice() };
	if (pole.type === 'vertex' && vertexMap)
		return { type: 'vertex', dir: vertexMap.dirs[pole.vertexId].slice() };
	return null;
}

function poleLabel(pole) {
	if (!pole) return '—';
	if (pole.type === 'center') return `⬡ ${pole.face}`;
	if (pole.type === 'vertex' && vertexMap) {
		const cls = vertexMap.vertexClasses[pole.vertexId];
		if (!cls) return '—';
		const faces = [...new Set(cls.map(c => c.face))].sort((a, b) => a - b);
		return `◇ ${faces.join('·')}`;
	}
	return '—';
}

function updatePoleLabels() {
	if (!currentLayout) {
		northPoleLabel.textContent = '—';
		southPoleLabel.textContent = '—';
		return;
	}
	northPoleLabel.textContent = poleLabel(currentLayout.northPole);
	southPoleLabel.textContent = poleLabel(currentLayout.southPole);
}

function findNearestSnap(wx, wy) {
	if (!currentLayout || !geo || !vertexMap) return null;
	const { res, placed } = currentLayout;
	let bestDist = Infinity, best = null;
	const snapThresh = 20 / viewScale;

	for (let i = 0; i < geo.nFaces; i++) {
		if (!placed[i]) continue;
		const dx = wx - res[i].x, dy = wy - res[i].y;
		const d = Math.sqrt(dx * dx + dy * dy);
		if (d < bestDist && d < snapThresh) {
			bestDist = d;
			best = { type: 'center', face: i };
		}
	}
	for (let i = 0; i < geo.nFaces; i++) {
		if (!placed[i]) continue;
		const verts = geo.polyVerts(res[i].x, res[i].y, res[i].r, i, currentLayout.mirrored);
		const n = geo.nSides(i);
		for (let k = 0; k < n; k++) {
			const dx = wx - verts[k].x, dy = wy - verts[k].y;
			const d = Math.sqrt(dx * dx + dy * dy);
			if (d < bestDist) {
				bestDist = d;
				const vid = vertexMap.vertexId[vertexMap.vkey(i, k)];
				best = { type: 'vertex', vertexId: vid };
			}
		}
	}
	return best;
}

function poleDir(pole) {
	if (!pole || !geo) return null;
	if (pole.type === 'center') return geo.c3[pole.face];
	if (pole.type === 'vertex' && vertexMap) return vertexMap.dirs[pole.vertexId];
	return null;
}

function findAntipode(pole) {
	if (!pole || !geo || !vertexMap) return null;
	const dir = poleDir(pole);
	if (!dir) return null;
	const anti = [-dir[0], -dir[1], -dir[2]];
	let bestFace = -1, bestFaceDot = -Infinity;
	for (let i = 0; i < geo.nFaces; i++) {
		const d = dot3(anti, geo.c3[i]);
		if (d > bestFaceDot) { bestFaceDot = d; bestFace = i; }
	}
	let bestVert = -1, bestVertDot = -Infinity;
	for (let v = 0; v < vertexMap.dirs.length; v++) {
		const d = dot3(anti, vertexMap.dirs[v]);
		if (d > bestVertDot) { bestVertDot = d; bestVert = v; }
	}
	if (bestVertDot > bestFaceDot)
		return { type: 'vertex', vertexId: bestVert, dir: vertexMap.dirs[bestVert] };
	return { type: 'center', face: bestFace };
}

function getGreatCircleSegments(planeNormal, layout) {
	if (!layout || !geo || !vertexMap) return [];
	const { res, placed } = layout;
	const segments = [];
	for (let i = 0; i < geo.nFaces; i++) {
		if (!placed[i]) continue;
		const n = geo.nSides(i);
		const verts2D = geo.polyVerts(res[i].x, res[i].y, res[i].r, i, layout.mirrored);
		const h = [];
		for (let k = 0; k < n; k++) {
			const vid = vertexMap.vertexId[vertexMap.vkey(i, k)];
			h.push(dot3(vertexMap.dirs[vid], planeNormal));
		}
		const crossings = [];
		for (let k = 0; k < n; k++) {
			const k2 = (k + 1) % n;
			if (Math.abs(h[k]) < 1e-9) {
				// Vertex on the plane — count as crossing if neighbours are strictly
				// on opposite sides, or if either neighbour is also on the plane
				const prev = (k - 1 + n) % n;
				if (h[prev] * h[k2] < 0 || Math.abs(h[k2]) < 1e-9 || Math.abs(h[prev]) < 1e-9) {
					crossings.push({ x: verts2D[k].x, y: verts2D[k].y });
				}
			} else if (Math.abs(h[k2]) > 1e-9 && h[k] * h[k2] < 0) {
				const t = h[k] / (h[k] - h[k2]);
				crossings.push({
					x: verts2D[k].x + t * (verts2D[k2].x - verts2D[k].x),
					y: verts2D[k].y + t * (verts2D[k2].y - verts2D[k].y)
				});
			}
		}
		if (crossings.length >= 2) segments.push([crossings[0], crossings[1]]);
	}
	return segments;
}

function getEquatorAndMeridian() {
	if (!currentLayout || !geo || !vertexMap) return { equator: [], meridian: [], eqRef: null };
	const axis = poleDir(currentLayout.northPole);
	if (!axis) return { equator: [], meridian: [], eqRef: null };
	const equator = getGreatCircleSegments(axis, currentLayout);
	let ref = [1, 0, 0];
	if (Math.abs(dot3(axis, ref)) > 0.9) ref = [0, 0, 1];
	// Project ref onto equatorial plane and normalize
	let eqRef = sub3(ref, scale3(axis, dot3(ref, axis)));
	eqRef = norm3(eqRef);
	const lonOff = currentLayout.lonOffset || 0;
	if (lonOff !== 0) {
		const perp = norm3(cross3(axis, eqRef));
		const c = Math.cos(lonOff), s = Math.sin(lonOff);
		eqRef = [eqRef[0] * c + perp[0] * s, eqRef[1] * c + perp[1] * s, eqRef[2] * c + perp[2] * s];
	}
	const meridianNormal = norm3(cross3(axis, eqRef));
	const meridian = getGreatCircleSegments(meridianNormal, currentLayout);
	return { equator, meridian, eqRef };
}

// Find 2D positions where a 3D direction projects onto the unfolded net
function getDirectionPositions2D(dir, layout) {
	if (!dir || !layout || !geo || !vertexMap) return [];
	const { res, placed } = layout;
	const positions = [];
	const seen = new Set();
	for (let i = 0; i < geo.nFaces; i++) {
		if (!placed[i]) continue;
		const n = geo.nSides(i);
		const verts2D = geo.polyVerts(res[i].x, res[i].y, res[i].r, i, layout.mirrored);
		// Get 3D directions for each vertex
		const vDirs = [];
		for (let k = 0; k < n; k++) {
			const vid = vertexMap.vertexId[vertexMap.vkey(i, k)];
			vDirs.push(vertexMap.dirs[vid]);
		}
		// Check if dir is inside the face's spherical polygon using winding
		// Project dir and vertices into face tangent plane
		const N = geo.c3[i];
		const dp = dot3(dir, N);
		if (dp < 0.01) continue; // direction is on the far side of this face
		// Gnomonic projection into face plane: p = dir / dp
		// For each vertex: v_proj = vDir / dot(vDir, N)
		// Check if projected dir is inside the polygon of projected vertices
		const px = dot3(dir, geo.frames[i][0]) / dp;
		const py = dot3(dir, geo.frames[i][1]) / dp;
		let inside = true;
		for (let k = 0; k < n; k++) {
			const k2 = (k + 1) % n;
			const dpk = dot3(vDirs[k], N), dpk2 = dot3(vDirs[k2], N);
			if (dpk < 1e-9 || dpk2 < 1e-9) { inside = false; break; }
			const ax = dot3(vDirs[k], geo.frames[i][0]) / dpk;
			const ay = dot3(vDirs[k], geo.frames[i][1]) / dpk;
			const bx = dot3(vDirs[k2], geo.frames[i][0]) / dpk2;
			const by = dot3(vDirs[k2], geo.frames[i][1]) / dpk2;
			// Cross product of (b-a) × (p-a) should be positive (CCW winding)
			const cross = (bx - ax) * (py - ay) - (by - ay) * (px - ax);
			if (cross < -1e-9) { inside = false; break; }
		}
		if (!inside) continue;
		// Interpolate 2D position using barycentric-like projection
		// Use the face tangent frame to map from gnomonic coords to 2D
		// The face center in gnomonic coords is at (0,0), maps to (res[i].x, res[i].y)
		// Vertex k at gnomonic (gx,gy) maps to verts2D[k]
		// Use least-squares affine from first 3 verts
		const gVerts = [];
		for (let k = 0; k < n; k++) {
			const dpk = dot3(vDirs[k], N);
			gVerts.push([dot3(vDirs[k], geo.frames[i][0]) / dpk, dot3(vDirs[k], geo.frames[i][1]) / dpk]);
		}
		// Affine transform: 2D = A * gnomonic + b, solve from 3 points
		const g0 = gVerts[0], g1 = gVerts[1], g2 = gVerts[2];
		const v0 = verts2D[0], v1 = verts2D[1], v2 = verts2D[2];
		const det = (g1[0] - g0[0]) * (g2[1] - g0[1]) - (g2[0] - g0[0]) * (g1[1] - g0[1]);
		if (Math.abs(det) < 1e-12) continue;
		const invDet = 1 / det;
		const a11 = ((v1.x - v0.x) * (g2[1] - g0[1]) - (v2.x - v0.x) * (g1[1] - g0[1])) * invDet;
		const a12 = ((v2.x - v0.x) * (g1[0] - g0[0]) - (v1.x - v0.x) * (g2[0] - g0[0])) * invDet;
		const a21 = ((v1.y - v0.y) * (g2[1] - g0[1]) - (v2.y - v0.y) * (g1[1] - g0[1])) * invDet;
		const a22 = ((v2.y - v0.y) * (g1[0] - g0[0]) - (v1.y - v0.y) * (g2[0] - g0[0])) * invDet;
		const dx = px - g0[0], dy = py - g0[1];
		const fx = v0.x + a11 * dx + a12 * dy;
		const fy = v0.y + a21 * dx + a22 * dy;
		const pk = Math.round(fx * 1e4) + ',' + Math.round(fy * 1e4);
		if (!seen.has(pk)) { seen.add(pk); positions.push({ x: fx, y: fy, face: i }); }
	}
	return positions;
}

function chainSegments(segments) {
	if (segments.length === 0) return [];
	const eps = 1e-6;
	const used = new Uint8Array(segments.length);
	const chains = [];
	function near(a, b) { return Math.abs(a.x - b.x) < eps && Math.abs(a.y - b.y) < eps; }
	for (let start = 0; start < segments.length; start++) {
		if (used[start]) continue;
		used[start] = 1;
		const chain = [segments[start][0], segments[start][1]];
		let changed = true;
		while (changed) {
			changed = false;
			for (let i = 0; i < segments.length; i++) {
				if (used[i]) continue;
				const tail = chain[chain.length - 1], head = chain[0];
				if (near(tail, segments[i][0])) { chain.push(segments[i][1]); used[i] = 1; changed = true; }
				else if (near(tail, segments[i][1])) { chain.push(segments[i][0]); used[i] = 1; changed = true; }
				else if (near(head, segments[i][1])) { chain.unshift(segments[i][0]); used[i] = 1; changed = true; }
				else if (near(head, segments[i][0])) { chain.unshift(segments[i][1]); used[i] = 1; changed = true; }
			}
		}
		chains.push(chain);
	}
	return chains;
}

function drawGreatCircle(segments, color, alpha, lineWidth, dash) {
	const chains = chainSegments(segments);
	ctx.save();
	ctx.strokeStyle = color.replace('ALPHA', alpha);
	ctx.lineWidth = lineWidth;
	ctx.setLineDash(dash);
	for (const chain of chains) {
		ctx.beginPath();
		for (let i = 0; i < chain.length; i++) {
			const [sx, sy] = toScreen(chain[i].x, chain[i].y);
			if (i === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
		}
		ctx.stroke();
	}
	ctx.setLineDash([]);
	ctx.restore();
}

function drawPoleMarker(x, y, isNorth, alpha) {
	const r = Math.max(6, viewScale * 0.09);
	const [sx, sy] = toScreen(x, y);
	ctx.save();
	ctx.beginPath();
	ctx.arc(sx, sy, r, 0, 2 * Math.PI);
	ctx.fillStyle = isNorth ? `rgba(220, 60, 60, ${alpha})` : `rgba(60, 100, 220, ${alpha})`;
	ctx.fill();
	ctx.strokeStyle = isNorth ? `rgba(255, 120, 120, ${alpha})` : `rgba(120, 160, 255, ${alpha})`;
	ctx.lineWidth = 1.5;
	ctx.stroke();
	ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
	ctx.font = `bold ${Math.max(8, r * 0.85)}px system-ui`;
	ctx.textAlign = 'center';
	ctx.textBaseline = 'middle';
	ctx.fillText(isNorth ? 'N' : 'S', sx, sy);
	ctx.restore();
}

// ═══════════════════════════════════════════════════════════════════════
// BFS Unfolding (generic)
// ═══════════════════════════════════════════════════════════════════════

function guidedUnfold(startFace, predefinedParents) {
	const N = geo.nFaces;
	const placed = new Array(N).fill(false);
	const parent = predefinedParents.slice();
	const res = new Array(N);
	res[startFace] = { x: 0, y: 0, r: geo.initialRotation || 0 };
	placed[startFace] = true;
	let count = 1;
	const queue = [startFace];
	let qi = 0;
	while (qi < queue.length) {
		const p = queue[qi++];
		for (let j = 0; j < N; j++) {
			if (placed[j] || parent[j] !== p) continue;
			res[j] = geo.ghostPlace(p, j, res, false);
			placed[j] = true;
			count++;
			queue.push(j);
		}
	}
	return { res, placed, parent, count, mirrored: false };
}

// ═══════════════════════════════════════════════════════════════════════
// Scoring
// ═══════════════════════════════════════════════════════════════════════

function bboxCriticalPoints(res, placed, parent, mirrored) {
	const N = geo.nFaces;
	const pts = [];
	for (let i = 0; i < N; i++) {
		if (!placed[i]) continue;
		const verts = geo.polyVerts(res[i].x, res[i].y, res[i].r, i, mirrored);
		const fx = res[i].x, fy = res[i].y;
		const n = geo.nSides(i);
		for (let k = 0; k < n; k++) {
			const v1 = verts[k], v2 = verts[(k + 1) % n];
			pts.push(v1.x, v1.y);
			// Find neighbor on this edge
			let targetFace = -1;
			for (const j of geo.adj[i]) {
				const slot = geo.edgeSlot(i, geo.edgeIdx(i, j), mirrored);
				if (slot === k) { targetFace = j; break; }
			}
			if (targetFace < 0) continue;
			const isInternal = placed[targetFace] && (parent[targetFace] === i || parent[i] === targetFace);
			if (isInternal) continue;
			const isCutEdge = placed[targetFace];
			let hasTab = true;
			if (isCutEdge) {
				const key = edgeKey(i, targetFace);
				const owner = tabOwnership[key] !== undefined ? tabOwnership[key] : Math.min(i, targetFace);
				hasTab = (owner === i);
			}
			if (hasTab) {
				const emx = (v1.x + v2.x) / 2 - fx, emy = (v1.y + v2.y) / 2 - fy;
				const eml = Math.sqrt(emx * emx + emy * emy);
				const nx = emx / eml, ny = emy / eml;
				const dx = v2.x - v1.x, dy = v2.y - v1.y;
				const [ins1, ins2] = geo.tabInsets(i, k);
				pts.push(v1.x + nx * geo.tabH + dx * ins1, v1.y + ny * geo.tabH + dy * ins1);
				pts.push(v2.x + nx * geo.tabH - dx * ins2, v2.y + ny * geo.tabH - dy * ins2);
			}
		}
	}
	return pts;
}

function bboxDims(pts, angle) {
	const cs = Math.cos(angle), sn = Math.sin(angle);
	let mnX = 1e9, mxX = -1e9, mnY = 1e9, mxY = -1e9;
	for (let p = 0; p < pts.length; p += 2) {
		const rx = pts[p] * cs - pts[p + 1] * sn;
		const ry = pts[p] * sn + pts[p + 1] * cs;
		mnX = Math.min(mnX, rx); mxX = Math.max(mxX, rx);
		mnY = Math.min(mnY, ry); mxY = Math.max(mxY, ry);
	}
	return { w: mxX - mnX, h: mxY - mnY, mnX, mxX, mnY, mxY };
}

function paperScore(pts, angle) {
	const d = bboxDims(pts, angle);
	const aspect = getEffectiveAspect();
	const s = Math.min(aspect / d.w, 1 / d.h);
	return aspect / (s * s);
}

function netArea(placed, parent) {
	const N = geo.nFaces;
	let area = 0;
	for (let i = 0; i < N; i++) {
		if (!placed[i]) continue;
		area += geo.faceArea(i);
	}
	for (let i = 0; i < N; i++) {
		if (!placed[i]) continue;
		for (const j of geo.adj[i]) {
			if (j <= i || !placed[j]) continue;
			if (parent[j] === i || parent[i] === j) continue;
			area += geo.singleTabArea;
		}
	}
	return area;
}

// ═══════════════════════════════════════════════════════════════════════
// Tree operations
// ═══════════════════════════════════════════════════════════════════════

function getDescendants(j, parent, placed) {
	const descs = [];
	const N = geo.nFaces;
	for (let k = 0; k < N; k++) {
		if (!placed[k] || k === j) continue;
		let p = k, steps = 0;
		while (p !== -1 && p !== j && steps < N) { p = parent[p]; steps++; }
		if (p === j) descs.push(k);
	}
	return descs;
}

function reparent(layout, newParent, child) {
	const { res, placed, parent, mirrored } = layout;
	const descs = getDescendants(child, parent, placed);
	placed[child] = false; parent[child] = -1;
	for (const d of descs) { placed[d] = false; parent[d] = -1; }
	const pos = geo.ghostPlace(newParent, child, res, mirrored);
	res[child] = pos;
	placed[child] = true;
	parent[child] = newParent;
	let changed = true;
	while (changed) {
		changed = false;
		for (const d of descs) {
			if (placed[d]) continue;
			for (const i of geo.adj[d]) {
				if (!placed[i]) continue;
				const p = geo.tryPlace(i, d, res, placed, mirrored);
				if (p) {
					res[d] = p; placed[d] = true; parent[d] = i;
					changed = true; break;
				}
			}
		}
	}
	layout.count = placed.filter(Boolean).length;
}

// ═══════════════════════════════════════════════════════════════════════
// Rotation optimization
// ═══════════════════════════════════════════════════════════════════════

function optimizeAndApplyRotation(layout) {
	const N = geo.nFaces;
	const { res, placed, parent, mirrored } = layout;
	const prevAngle = layout.angle || 0;
	if (prevAngle !== 0) {
		const pc = Math.cos(-prevAngle), ps = Math.sin(-prevAngle);
		for (let i = 0; i < N; i++) {
			if (!placed[i]) continue;
			const x = res[i].x, y = res[i].y;
			res[i].x = x * pc - y * ps;
			res[i].y = x * ps + y * pc;
			res[i].r -= prevAngle;
		}
	}
	const pts = bboxCriticalPoints(res, placed, parent, mirrored || false);
	let bestA = 0, bestAr = Infinity;
	for (let deg = 0; deg < 180; deg += 1) {
		const rad = deg * Math.PI / 180;
		const ar = paperScore(pts, rad);
		if (ar < bestAr) { bestAr = ar; bestA = rad; }
	}
	if (bestA > Math.PI / 2) bestA -= Math.PI;
	layout.angle = bestA;
	if (bestA !== 0) {
		const cs = Math.cos(bestA), sn = Math.sin(bestA);
		for (let i = 0; i < N; i++) {
			if (!placed[i]) continue;
			const x = res[i].x, y = res[i].y;
			res[i].x = x * cs - y * sn;
			res[i].y = x * sn + y * cs;
			res[i].r += bestA;
		}
	}
}

// ═══════════════════════════════════════════════════════════════════════
// Layout computation
// ═══════════════════════════════════════════════════════════════════════

function computeLayout() {
	if (!geo) return;
	const presetIdx = parseInt(presetSelect.value);
	const customs = loadCustomLayouts();
	let preset = null;
	if (presetIdx >= 0 && presetIdx < geo.presets.length) {
		preset = geo.presets[presetIdx];
	} else {
		preset = customs[presetSelect.value];
	}
	if (!preset) return;
	tabOwnership = preset.tabs ? Object.assign({}, preset.tabs) : {};
	const seed = seedFromParents(preset.parents);
	const layout = guidedUnfold(seed, preset.parents);
	layout.seed = seed;
	layout.mirrored = preset.mirrored || false;
	layout.label = preset.label || '';
	currentLayout = layout;
	rebuildVertexMap();
	layout.northPole = preset.northPole ? resolvePole(preset.northPole) : null;
	layout.southPole = preset.southPole ? resolvePole(preset.southPole) : null;
	layout.lonOffset = preset.lonOffset || 0;
	optimizeAndApplyRotation(currentLayout);
	updateDeleteBtnVisibility();
	updatePoleLabels();
	draw();
}

// ═══════════════════════════════════════════════════════════════════════
// Canvas transforms
// ═══════════════════════════════════════════════════════════════════════

let viewOX = 0, viewOY = 0, viewScale = 1;
let paperMinX = -Infinity, paperMaxX = Infinity, paperMinY = -Infinity, paperMaxY = Infinity;

function toScreen(x, y) {
	return [canvas.width / 2 + (x - viewOX) * viewScale, canvas.height / 2 - (y - viewOY) * viewScale];
}
function toWorld(sx, sy) {
	return [(sx - canvas.width / 2) / viewScale + viewOX, -(sy - canvas.height / 2) / viewScale + viewOY];
}

// ═══════════════════════════════════════════════════════════════════════
// Edge classification
// ═══════════════════════════════════════════════════════════════════════

function classifyEdges(layout) {
	const N = geo.nFaces;
	const { res, placed, parent, mirrored } = layout;
	const edgeNeighbor = [];
	for (let i = 0; i < N; i++) {
		const n = geo.nSides(i);
		edgeNeighbor.push(new Array(n).fill(null));
		if (!placed[i]) continue;
		for (const j of geo.adj[i]) {
			const k = geo.edgeIdx(i, j);
			const isInternal = placed[j] && (parent[j] === i || parent[i] === j);
			const slot = geo.edgeSlot(i, k, mirrored);
			edgeNeighbor[i][slot] = { j, isInternal };
		}
	}
	return edgeNeighbor;
}

function pointInPoly(wx, wy, verts) {
	let pos = 0, neg = 0;
	for (let p = 0; p < verts.length; p++) {
		const a = verts[p], b = verts[(p + 1) % verts.length];
		const cross = (b.x - a.x) * (wy - a.y) - (b.y - a.y) * (wx - a.x);
		if (cross > 0) pos++; else if (cross < 0) neg++;
		if (pos && neg) return false;
	}
	return true;
}

// ═══════════════════════════════════════════════════════════════════════
// Drawing
// ═══════════════════════════════════════════════════════════════════════

function draw() {
	if (!currentLayout || !geo) return;
	const N = geo.nFaces;
	const { res, placed, parent, count, seed, mirrored } = currentLayout;

	canvas.width = window.innerWidth;
	canvas.height = window.innerHeight;

	const _bbPts = bboxCriticalPoints(res, placed, parent, mirrored);
	const _bb = bboxDims(_bbPts, 0);
	const mnX = _bb.mnX, mxX = _bb.mxX, mnY = _bb.mnY, mxY = _bb.mxY;

	const bbPad = 0.5;
	const bbW = (mxX - mnX) + 2 * bbPad;
	const bbH = (mxY - mnY) + 2 * bbPad;

	viewOX = (mnX + mxX) / 2;
	viewOY = (mnY + mxY) / 2;
	const margin = 20;
	viewScale = Math.min((canvas.width - margin * 2) / bbW, (canvas.height - margin * 2) / bbH);

	ctx.clearRect(0, 0, canvas.width, canvas.height);

	// ── Paper outline ──
	{
		const aspect = getEffectiveAspect();
		const netW = mxX - mnX, netH = mxY - mnY;
		const s = Math.min(aspect / netW, 1 / netH);
		const pW = aspect / s, pH = 1 / s;
		paperMinX = viewOX - pW / 2; paperMaxX = viewOX + pW / 2;
		paperMinY = viewOY - pH / 2; paperMaxY = viewOY + pH / 2;
		const [ax0, ay0] = toScreen(paperMinX, paperMaxY);
		const [ax1, ay1] = toScreen(paperMaxX, paperMinY);
		ctx.save();
		// Printable area (inner)
		ctx.strokeStyle = 'rgba(100, 200, 100, 0.3)';
		ctx.lineWidth = 2;
		ctx.setLineDash([8, 6]);
		ctx.strokeRect(ax0, ay0, ax1 - ax0, ay1 - ay0);
		// Outer paper (with margin)
		const marginMM = getMarginMM();
		if (marginMM > 0) {
			const dims = getSelectedPaperDims();
			const isPortrait = orientationSelect.value === 'portrait';
			const pw = isPortrait ? dims.height : dims.width;
			const ph = isPortrait ? dims.width : dims.height;
			const ew = pw - 2 * marginMM, eh = ph - 2 * marginMM;
			const mFracW = marginMM / ew, mFracH = marginMM / eh;
			const oW = pW * (1 + 2 * mFracW), oH = pH * (1 + 2 * mFracH);
			const [bx0, by0] = toScreen(viewOX - oW / 2, viewOY + oH / 2);
			const [bx1, by1] = toScreen(viewOX + oW / 2, viewOY - oH / 2);
			ctx.strokeStyle = 'rgba(200, 200, 100, 0.2)';
			ctx.lineWidth = 1;
			ctx.strokeRect(bx0, by0, bx1 - bx0, by1 - by0);
		}
		ctx.setLineDash([]);
		ctx.restore();
	}

	const edgeNeighbor = classifyEdges(currentLayout);

	// ── Build boundary edges ──
	boundaryEdges = [];
	for (let i = 0; i < N; i++) {
		if (!placed[i]) continue;
		const n = geo.nSides(i);
		const fx = res[i].x, fy = res[i].y, rot = res[i].r;
		const verts = geo.polyVerts(fx, fy, rot, i, mirrored);
		for (let k = 0; k < n; k++) {
			const info = edgeNeighbor[i][k];
			if (info && info.isInternal) continue;
			let targetFace = -1;
			if (info) {
				targetFace = info.j;
			} else {
				for (const j of geo.adj[i]) {
					const slot = geo.edgeSlot(i, geo.edgeIdx(i, j), mirrored);
					if (slot === k) { targetFace = j; break; }
				}
			}
			if (targetFace < 0) continue;
			const v1 = verts[k], v2 = verts[(k + 1) % n];
			const emx = (v1.x + v2.x) / 2 - fx, emy = (v1.y + v2.y) / 2 - fy;
			const eml = Math.sqrt(emx * emx + emy * emy);
			const nx = emx / eml, ny = emy / eml;
			const dx = v2.x - v1.x, dy = v2.y - v1.y;
			const [ins1, ins2] = geo.tabInsets(i, k);
			const o1x = v1.x + nx * geo.tabH + dx * ins1, o1y = v1.y + ny * geo.tabH + dy * ins1;
			const o2x = v2.x + nx * geo.tabH - dx * ins2, o2y = v2.y + ny * geo.tabH - dy * ins2;
			const flapVerts = [
				{ x: v1.x, y: v1.y }, { x: o1x, y: o1y },
				{ x: o2x, y: o2y }, { x: v2.x, y: v2.y }
			];
			const ghostPos = geo.ghostPlace(i, targetFace, res, mirrored);
			const ghostVerts = geo.polyVerts(ghostPos.x, ghostPos.y, ghostPos.r, targetFace, mirrored);
			const isCutEdge = placed[targetFace];
			boundaryEdges.push({ face: i, edge: k, targetFace, flapVerts, ghostPos, ghostVerts, isCutEdge });
		}
	}

	// ── Draw flap trapezoids (clipped outside polygons) ──
	ctx.save();
	ctx.beginPath();
	ctx.rect(0, 0, canvas.width, canvas.height);
	for (let i = 0; i < N; i++) {
		if (!placed[i]) continue;
		const verts = geo.polyVerts(res[i].x, res[i].y, res[i].r, i, mirrored);
		for (let k = 0; k < verts.length; k++) {
			const [sx, sy] = toScreen(verts[k].x, verts[k].y);
			if (k === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
		}
		ctx.closePath();
	}
	ctx.clip('evenodd');

	for (const edge of boundaryEdges) {
		if (glueTabMode && edge.isCutEdge) {
			const key = edgeKey(edge.face, edge.targetFace);
			const owner = tabOwnership[key] !== undefined ? tabOwnership[key] : Math.min(edge.face, edge.targetFace);
			if (owner !== edge.face) continue;
		}
		const isHovered = hoveredEdge && hoveredEdge.face === edge.face && hoveredEdge.edge === edge.edge;
		const fv = edge.flapVerts;
		ctx.beginPath();
		let [sx, sy] = toScreen(fv[0].x, fv[0].y);
		ctx.moveTo(sx, sy);
		for (let p = 1; p < 4; p++) {
			[sx, sy] = toScreen(fv[p].x, fv[p].y);
			ctx.lineTo(sx, sy);
		}
		ctx.closePath();

		const matchesFace = hoveredFace >= 0 && edge.targetFace === hoveredFace;
		if (isHovered) {
			ctx.fillStyle = 'rgba(100, 220, 255, 0.7)';
			ctx.strokeStyle = 'rgba(50, 150, 255, 0.9)';
			ctx.lineWidth = 2;
		} else if (matchesFace) {
			ctx.fillStyle = 'rgba(100, 220, 255, 0.5)';
			ctx.strokeStyle = 'rgba(50, 150, 255, 0.7)';
			ctx.lineWidth = 1.5;
		} else if (!glueTabMode && edge.isCutEdge) {
			const key = edgeKey(edge.face, edge.targetFace);
			const owner = tabOwnership[key] !== undefined ? tabOwnership[key] : Math.min(edge.face, edge.targetFace);
			if (owner === edge.face) {
				ctx.fillStyle = 'rgba(255, 180, 200, 0.6)';
				ctx.strokeStyle = 'rgba(0, 0, 0, 0.35)';
			} else {
				ctx.fillStyle = 'rgba(255, 180, 200, 0.2)';
				ctx.strokeStyle = 'rgba(180, 100, 130, 0.3)';
			}
			ctx.lineWidth = 1;
		} else {
			ctx.fillStyle = 'rgba(255, 180, 200, 0.6)';
			ctx.strokeStyle = 'rgba(0, 0, 0, 0.35)';
			ctx.lineWidth = 1;
		}
		ctx.setLineDash([6, 4]);
		ctx.fill();
		ctx.stroke();
		ctx.setLineDash([]);
	}

	// ── Ghost flap on opposite side (glue tab mode hover) ──
	if (glueTabMode && hoveredEdge && hoveredEdge.isCutEdge) {
		const opposite = boundaryEdges.find(e =>
			e.face === hoveredEdge.targetFace && e.targetFace === hoveredEdge.face);
		if (opposite) {
			const fv = opposite.flapVerts;
			ctx.beginPath();
			let [sx, sy] = toScreen(fv[0].x, fv[0].y);
			ctx.moveTo(sx, sy);
			for (let p = 1; p < 4; p++) {
				[sx, sy] = toScreen(fv[p].x, fv[p].y);
				ctx.lineTo(sx, sy);
			}
			ctx.closePath();
			ctx.fillStyle = 'rgba(255, 180, 60, 0.3)';
			ctx.strokeStyle = 'rgba(255, 180, 60, 0.6)';
			ctx.lineWidth = 1.5;
			ctx.setLineDash([4, 3]);
			ctx.fill();
			ctx.stroke();
			ctx.setLineDash([]);
		}
	}
	ctx.restore();

	// ── Ghost polygon preview on hover ──
	if (hoveredEdge && !glueTabMode) {
		const { ghostVerts, targetFace, ghostPos } = hoveredEdge;
		const ghostFaces = [{ id: targetFace, verts: ghostVerts, pos: ghostPos }];
		if (placed[targetFace]) {
			const dx = ghostPos.x - res[targetFace].x;
			const dy = ghostPos.y - res[targetFace].y;
			const dr = ghostPos.r - res[targetFace].r;
			const cs = Math.cos(dr), sn = Math.sin(dr);
			const ox = res[targetFace].x, oy = res[targetFace].y;
			const descs = getDescendants(targetFace, parent, placed);
			for (const d of descs) {
				const rx = res[d].x - ox, ry = res[d].y - oy;
				const gx = ghostPos.x + rx * cs - ry * sn;
				const gy = ghostPos.y + rx * sn + ry * cs;
				const gr = res[d].r + dr;
				ghostFaces.push({ id: d, verts: geo.polyVerts(gx, gy, gr, d, mirrored), pos: { x: gx, y: gy } });
			}
		}
		for (const gf of ghostFaces) {
			ctx.beginPath();
			for (let k = 0; k < gf.verts.length; k++) {
				const [sx, sy] = toScreen(gf.verts[k].x, gf.verts[k].y);
				if (k === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
			}
			ctx.closePath();
			ctx.fillStyle = geo.ghostColor(gf.id);
			ctx.fill();
			ctx.strokeStyle = 'rgba(100, 200, 255, 0.7)';
			ctx.lineWidth = 2;
			ctx.setLineDash([6, 4]);
			ctx.stroke();
			ctx.setLineDash([]);
			const [gcx, gcy] = toScreen(gf.pos.x, gf.pos.y);
			ctx.fillStyle = 'rgba(100, 200, 255, 0.7)';
			ctx.font = `${Math.max(10, viewScale * 0.15)}px system-ui`;
			ctx.textAlign = 'center';
			ctx.textBaseline = 'middle';
			ctx.fillText(gf.id, gcx, gcy);
		}
		if (ghostFaces.length > 1) {
			ctx.lineWidth = 1.5;
			ctx.strokeStyle = 'rgba(100, 200, 255, 0.5)';
			ctx.setLineDash([4, 3]);
			for (let gi = 1; gi < ghostFaces.length; gi++) {
				const gf = ghostFaces[gi];
				const gp = ghostFaces.find(g => g.id === parent[gf.id]);
				if (!gp) continue;
				const [sx1, sy1] = toScreen(gf.pos.x, gf.pos.y);
				const [sx2, sy2] = toScreen(gp.pos.x, gp.pos.y);
				ctx.beginPath(); ctx.moveTo(sx1, sy1); ctx.lineTo(sx2, sy2); ctx.stroke();
			}
			const [sx1, sy1] = toScreen(ghostPos.x, ghostPos.y);
			const [sx2, sy2] = toScreen(res[hoveredEdge.face].x, res[hoveredEdge.face].y);
			ctx.beginPath(); ctx.moveTo(sx1, sy1); ctx.lineTo(sx2, sy2); ctx.stroke();
			ctx.setLineDash([]);
		}
	}

	// ── Draw polygon faces ──
	for (let i = 0; i < N; i++) {
		if (!placed[i]) continue;
		const n = geo.nSides(i);
		const verts = geo.polyVerts(res[i].x, res[i].y, res[i].r, i, mirrored);
		const isTarget = hoveredEdge && hoveredEdge.targetFace === i;
		const isSelf = hoveredFace === i;

		ctx.beginPath();
		for (let k = 0; k < verts.length; k++) {
			const [sx, sy] = toScreen(verts[k].x, verts[k].y);
			if (k === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
		}
		ctx.closePath();
		ctx.fillStyle = geo.faceColor(i, isSelf, isTarget);
		ctx.fill();

		// Edge lines
		for (let k = 0; k < n; k++) {
			const info = edgeNeighbor[i][k];
			const [sx1, sy1] = toScreen(verts[k].x, verts[k].y);
			const [sx2, sy2] = toScreen(verts[(k + 1) % n].x, verts[(k + 1) % n].y);
			const isHoveredEdge = hoveredEdge && hoveredEdge.face === i && hoveredEdge.edge === k;

			ctx.beginPath(); ctx.moveTo(sx1, sy1); ctx.lineTo(sx2, sy2);
			if (isHoveredEdge) {
				ctx.strokeStyle = 'rgba(100, 220, 255, 1.0)';
				ctx.lineWidth = 3;
				ctx.setLineDash([]);
			} else if (info && info.isInternal) {
				ctx.strokeStyle = 'rgba(200, 200, 200, 0.25)';
				ctx.lineWidth = 1;
				ctx.setLineDash([4, 4]);
			} else {
				ctx.strokeStyle = 'rgba(200, 200, 200, 0.7)';
				ctx.lineWidth = 1.5;
				ctx.setLineDash([]);
			}
			ctx.stroke();
			ctx.setLineDash([]);
		}

		// Face label
		const [cx, cy] = toScreen(res[i].x, res[i].y);
		ctx.fillStyle = (isSelf || isTarget) ? 'rgba(100, 200, 255, 0.9)' : '#ddd';
		ctx.font = `${Math.max(10, viewScale * 0.15)}px system-ui`;
		ctx.textAlign = 'center';
		ctx.textBaseline = 'middle';
		ctx.fillText(i, cx, cy);
	}

	// ── Equator & Meridian ──
	if (currentLayout.northPole) {
		const { equator, meridian, eqRef } = getEquatorAndMeridian();
		drawGreatCircle(equator, 'rgba(80, 220, 80, ALPHA)', 0.7, 2, []);
		drawGreatCircle(meridian, 'rgba(220, 180, 60, ALPHA)', 0.7, 2, []);
		// ── 0° marker on equator ──
		if (eqRef) {
			const zeroPositions = getDirectionPositions2D(eqRef, currentLayout);
			for (const pos of zeroPositions) {
				const r = Math.max(6, viewScale * 0.09);
				const [sx, sy] = toScreen(pos.x, pos.y);
				ctx.save();
				ctx.beginPath();
				ctx.arc(sx, sy, r, 0, 2 * Math.PI);
				ctx.fillStyle = merEditMode ? 'rgba(220, 180, 60, 0.95)' : 'rgba(220, 180, 60, 0.8)';
				ctx.fill();
				ctx.strokeStyle = 'rgba(255, 220, 100, 0.9)';
				ctx.lineWidth = 1.5;
				ctx.stroke();
				ctx.fillStyle = 'rgba(0, 0, 0, 0.9)';
				ctx.font = `bold ${Math.max(7, r * 0.8)}px system-ui`;
				ctx.textAlign = 'center';
				ctx.textBaseline = 'middle';
				ctx.fillText('0', sx, sy);
				if (merEditMode) {
					const hr = Math.max(10, viewScale * 0.14);
					ctx.beginPath(); ctx.arc(sx, sy, hr, 0, 2 * Math.PI);
					ctx.strokeStyle = 'rgba(220, 180, 60, 0.8)';
					ctx.lineWidth = 2; ctx.setLineDash([4, 3]); ctx.stroke(); ctx.setLineDash([]);
				}
				ctx.restore();
			}
		}
	}

	// ── Ghost equator/meridian preview ──
	if (poleEditMode && hoveredSnap) {
		const hDir = hoveredSnap.type === 'center' ? geo.c3[hoveredSnap.face]
			: vertexMap.dirs[hoveredSnap.vertexId];
		if (hDir) {
			const ghostEq = getGreatCircleSegments(hDir, currentLayout);
			drawGreatCircle(ghostEq, 'rgba(80, 220, 80, ALPHA)', 0.3, 2, []);
			let ref = [1, 0, 0];
			if (Math.abs(dot3(hDir, ref)) > 0.9) ref = [0, 0, 1];
			const ghostMN = norm3(cross3(hDir, ref));
			const ghostMer = getGreatCircleSegments(ghostMN, currentLayout);
			drawGreatCircle(ghostMer, 'rgba(220, 180, 60, ALPHA)', 0.3, 2, []);
			// Ghost 0° marker
			let ghostEqRef = sub3(ref, scale3(hDir, dot3(ref, hDir)));
			ghostEqRef = norm3(ghostEqRef);
			const lonOff = currentLayout.lonOffset || 0;
			if (lonOff !== 0) {
				const perp = norm3(cross3(hDir, ghostEqRef));
				const c = Math.cos(lonOff), s = Math.sin(lonOff);
				ghostEqRef = [ghostEqRef[0]*c+perp[0]*s, ghostEqRef[1]*c+perp[1]*s, ghostEqRef[2]*c+perp[2]*s];
			}
			const ghostZeroPos = getDirectionPositions2D(ghostEqRef, currentLayout);
			for (const gzp of ghostZeroPos) {
				const r = Math.max(6, viewScale * 0.09);
				const [sx, sy] = toScreen(gzp.x, gzp.y);
				ctx.beginPath(); ctx.arc(sx, sy, r, 0, 2 * Math.PI);
				ctx.fillStyle = 'rgba(220, 180, 60, 0.3)';
				ctx.fill();
				ctx.strokeStyle = 'rgba(255, 220, 100, 0.4)';
				ctx.lineWidth = 1.5; ctx.stroke();
				ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
				ctx.font = `bold ${Math.max(7, r * 0.8)}px system-ui`;
				ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
				ctx.fillText('0', sx, sy);
			}
		}
	}

	// ── Ghost meridian preview (meridian edit mode) ──
	if (merEditMode && hoveredSnap && currentLayout.northPole) {
		const axis = poleDir(currentLayout.northPole);
		const snapDir = hoveredSnap.type === 'center' ? geo.c3[hoveredSnap.face]
			: vertexMap.dirs[hoveredSnap.vertexId];
		if (axis && snapDir) {
			const proj = sub3(snapDir, scale3(axis, dot3(snapDir, axis)));
			const pl = Math.sqrt(dot3(proj, proj));
			if (pl > 1e-6) {
				const target = scale3(proj, 1 / pl);
				const ghostMN = norm3(cross3(axis, target));
				const ghostMer = getGreatCircleSegments(ghostMN, currentLayout);
				drawGreatCircle(ghostMer, 'rgba(220, 180, 60, ALPHA)', 0.3, 2, []);
				// Ghost 0° marker
				const ghostZeroPos = getDirectionPositions2D(target, currentLayout);
				for (const gzp of ghostZeroPos) {
					const r = Math.max(6, viewScale * 0.09);
					const [sx, sy] = toScreen(gzp.x, gzp.y);
					ctx.beginPath(); ctx.arc(sx, sy, r, 0, 2 * Math.PI);
					ctx.fillStyle = 'rgba(220, 180, 60, 0.3)';
					ctx.fill();
					ctx.strokeStyle = 'rgba(255, 220, 100, 0.4)';
					ctx.lineWidth = 1.5; ctx.stroke();
					ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
					ctx.font = `bold ${Math.max(7, r * 0.8)}px system-ui`;
					ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
					ctx.fillText('0', sx, sy);
				}
			}
		}
	}

	// ── Pole markers ──
	if (currentLayout.northPole) {
		const positions = getPolePositions2D(currentLayout.northPole, currentLayout);
		for (const pos of positions) drawPoleMarker(pos.x, pos.y, true, 0.9);
		if (poleEditMode === 'north') {
			const hr = Math.max(10, viewScale * 0.14);
			for (const pos of positions) {
				const [sx, sy] = toScreen(pos.x, pos.y);
				ctx.beginPath(); ctx.arc(sx, sy, hr, 0, 2 * Math.PI);
				ctx.strokeStyle = 'rgba(255, 120, 120, 0.8)';
				ctx.lineWidth = 2; ctx.setLineDash([4, 3]); ctx.stroke(); ctx.setLineDash([]);
			}
		}
	}
	if (currentLayout.southPole) {
		const positions = getPolePositions2D(currentLayout.southPole, currentLayout);
		for (const pos of positions) drawPoleMarker(pos.x, pos.y, false, 0.9);
		if (poleEditMode === 'south') {
			const hr = Math.max(10, viewScale * 0.14);
			for (const pos of positions) {
				const [sx, sy] = toScreen(pos.x, pos.y);
				ctx.beginPath(); ctx.arc(sx, sy, hr, 0, 2 * Math.PI);
				ctx.strokeStyle = 'rgba(120, 160, 255, 0.8)';
				ctx.lineWidth = 2; ctx.setLineDash([4, 3]); ctx.stroke(); ctx.setLineDash([]);
			}
		}
	}

	// ── Ghost pole preview ──
	if (poleEditMode && hoveredSnap) {
		const isNorth = poleEditMode === 'north';
		const positions = getPolePositions2D(hoveredSnap, currentLayout);
		for (const pos of positions) drawPoleMarker(pos.x, pos.y, isNorth, 0.4);
		const antiPole = findAntipode(hoveredSnap);
		if (antiPole) {
			const antiPos = getPolePositions2D(antiPole, currentLayout);
			for (const pos of antiPos) drawPoleMarker(pos.x, pos.y, !isNorth, 0.3);
		}
	}

	// ── Score ──
	const nArea = netArea(placed, parent);
	const pArea = paperScore(_bbPts, 0);
	const fill = (nArea / pArea * 100).toFixed(1);
	scoreDiv.textContent = `${count}/${N} faces — Page fill: ${fill}%`;
	currentLayout._currentFill = parseFloat(fill);
}

// ═══════════════════════════════════════════════════════════════════════
// Mouse interaction
// ═══════════════════════════════════════════════════════════════════════

function hitTestEdge(mx, my) {
	const [wx, wy] = toWorld(mx, my);
	if (wx < paperMinX || wx > paperMaxX || wy < paperMinY || wy > paperMaxY) return null;
	for (const edge of boundaryEdges) {
		if (glueTabMode && edge.isCutEdge) {
			const key = edgeKey(edge.face, edge.targetFace);
			const owner = tabOwnership[key] !== undefined ? tabOwnership[key] : Math.min(edge.face, edge.targetFace);
			if (owner !== edge.face) continue;
		}
		if (pointInPoly(wx, wy, edge.flapVerts)) return edge;
	}
	return null;
}

function hitTestFace(mx, my) {
	if (!currentLayout || !geo) return -1;
	const [wx, wy] = toWorld(mx, my);
	const { res, placed } = currentLayout;
	for (let i = 0; i < geo.nFaces; i++) {
		if (!placed[i]) continue;
		const verts = geo.polyVerts(res[i].x, res[i].y, res[i].r, i, currentLayout.mirrored);
		if (pointInPoly(wx, wy, verts)) return i;
	}
	return -1;
}

canvas.addEventListener('mousemove', e => {
	// ── Meridian edit mode ──
	if (merEditMode) {
		const [wx, wy] = toWorld(e.clientX, e.clientY);
		const hitR = 12 / viewScale;
		// Check if hovering pole markers for mode switching
		let overMarker = null;
		if (currentLayout.northPole) {
			const nPos = getPolePositions2D(currentLayout.northPole, currentLayout);
			for (const pos of nPos) { if (Math.hypot(wx - pos.x, wy - pos.y) < hitR) { overMarker = 'N'; break; } }
		}
		if (!overMarker && currentLayout.southPole) {
			const sPos = getPolePositions2D(currentLayout.southPole, currentLayout);
			for (const pos of sPos) { if (Math.hypot(wx - pos.x, wy - pos.y) < hitR) { overMarker = 'S'; break; } }
		}
		if (overMarker) {
			if (hoveredSnap) { hoveredSnap = null; draw(); }
			tooltip.style.display = 'block';
			tooltip.style.left = (e.clientX + 14) + 'px';
			tooltip.style.top = (e.clientY + 14) + 'px';
			tooltip.innerHTML = `Edit ${overMarker === 'N' ? 'North' : 'South'} pole`;
			canvas.style.cursor = 'pointer';
			return;
		}
		const snap = findNearestSnap(wx, wy);
		const changed = JSON.stringify(snap) !== JSON.stringify(hoveredSnap);
		hoveredSnap = snap;
		if (changed) draw();
		if (snap) {
			const pLabel = poleLabel(snap);
			tooltip.style.display = 'block';
			tooltip.style.left = (e.clientX + 14) + 'px';
			tooltip.style.top = (e.clientY + 14) + 'px';
			tooltip.innerHTML = `0° → ${pLabel}`;
			canvas.style.cursor = 'pointer';
		} else {
			tooltip.style.display = 'none';
			canvas.style.cursor = 'crosshair';
		}
		return;
	}
	// ── Pole edit mode ──
	if (poleEditMode) {
		const [wx, wy] = toWorld(e.clientX, e.clientY);
		const hitR = 12 / viewScale;
		// Check if hovering 0° or other pole markers for mode switching
		let overMarker = null;
		if (currentLayout.northPole) {
			const { eqRef } = getEquatorAndMeridian();
			if (eqRef) {
				const zeroPos = getDirectionPositions2D(eqRef, currentLayout);
				for (const pos of zeroPos) { if (Math.hypot(wx - pos.x, wy - pos.y) < hitR) { overMarker = '0'; break; } }
			}
		}
		if (!overMarker && poleEditMode !== 'north' && currentLayout.northPole) {
			const nPos = getPolePositions2D(currentLayout.northPole, currentLayout);
			for (const pos of nPos) { if (Math.hypot(wx - pos.x, wy - pos.y) < hitR) { overMarker = 'N'; break; } }
		}
		if (!overMarker && poleEditMode !== 'south' && currentLayout.southPole) {
			const sPos = getPolePositions2D(currentLayout.southPole, currentLayout);
			for (const pos of sPos) { if (Math.hypot(wx - pos.x, wy - pos.y) < hitR) { overMarker = 'S'; break; } }
		}
		if (overMarker) {
			if (hoveredSnap) { hoveredSnap = null; draw(); }
			tooltip.style.display = 'block';
			tooltip.style.left = (e.clientX + 14) + 'px';
			tooltip.style.top = (e.clientY + 14) + 'px';
			tooltip.innerHTML = overMarker === '0' ? 'Edit null meridian'
				: `Edit ${overMarker === 'N' ? 'North' : 'South'} pole`;
			canvas.style.cursor = 'pointer';
			return;
		}
		const snap = findNearestSnap(wx, wy);
		const changed = JSON.stringify(snap) !== JSON.stringify(hoveredSnap);
		hoveredSnap = snap;
		if (changed) draw();
		if (snap) {
			const isNorth = poleEditMode === 'north';
			const pLabel = poleLabel(snap);
			const anti = findAntipode(snap);
			const aLabel = anti ? poleLabel(anti) : '?';
			const label = isNorth
				? `N: ${pLabel} · S: ${aLabel}`
				: `S: ${pLabel} · N: ${aLabel}`;
			tooltip.style.display = 'block';
			tooltip.style.left = (e.clientX + 14) + 'px';
			tooltip.style.top = (e.clientY + 14) + 'px';
			tooltip.innerHTML = label;
			canvas.style.cursor = 'pointer';
		} else {
			tooltip.style.display = 'none';
			canvas.style.cursor = 'crosshair';
		}
		return;
	}
	hoveredSnap = null;

	const hit = hitTestEdge(e.clientX, e.clientY);
	const face = hit ? -1 : hitTestFace(e.clientX, e.clientY);
	if (hit !== hoveredEdge || face !== hoveredFace) {
		hoveredEdge = hit;
		hoveredFace = face;
		if (hit && currentLayout) {
			if (glueTabMode && hit.isCutEdge) {
				const key = edgeKey(hit.face, hit.targetFace);
				const owner = tabOwnership[key] !== undefined ? tabOwnership[key] : Math.min(hit.face, hit.targetFace);
				const savedOwner = tabOwnership[key];
				tabOwnership[key] = owner === hit.face ? hit.targetFace : hit.face;
				const pts = bboxCriticalPoints(currentLayout.res, currentLayout.placed, currentLayout.parent, currentLayout.mirrored);
				hit.previewFill = parseFloat((netArea(currentLayout.placed, currentLayout.parent) / paperScore(pts, 0) * 100).toFixed(1));
				if (savedOwner !== undefined) tabOwnership[key] = savedOwner; else delete tabOwnership[key];
			} else if (!glueTabMode) {
				const preview = cloneLayout(currentLayout);
				reparent(preview, hit.face, hit.targetFace);
				optimizeAndApplyRotation(preview);
				const pts = bboxCriticalPoints(preview.res, preview.placed, preview.parent, preview.mirrored);
				hit.previewFill = parseFloat((netArea(preview.placed, preview.parent) / paperScore(pts, 0) * 100).toFixed(1));
			}
		}
		draw();
	}
	if (hit) {
		const tf = hit.targetFace;
		const curFill = currentLayout._currentFill || 0;
		const diff = hit.previewFill !== undefined ? hit.previewFill - curFill : 0;
		const diffStr = diff > 0 ? `<span style="color:#4f4">+${diff.toFixed(1)}%</span>` : diff < 0 ? `<span style="color:#f44">${diff.toFixed(1)}%</span>` : `<span style="color:#888">±0%</span>`;
		const fillStr = hit.previewFill !== undefined ? ` → ${hit.previewFill.toFixed(1)}% ${diffStr}` : '';
		let label;
		if (glueTabMode) {
			const key = edgeKey(hit.face, tf);
			const owner = tabOwnership[key] !== undefined ? tabOwnership[key] : Math.min(hit.face, tf);
			label = `Tab on face ${owner} → face ${owner === hit.face ? tf : hit.face}${fillStr}`;
		} else {
			label = `Face ${tf} (${geo.faceLabel(tf)})${fillStr}`;
		}
		tooltip.style.display = 'block';
		tooltip.style.left = (e.clientX + 14) + 'px';
		tooltip.style.top = (e.clientY + 14) + 'px';
		tooltip.innerHTML = label;
		canvas.style.cursor = 'pointer';
	} else if (!poleEditMode && !merEditMode && !glueTabMode && currentLayout.northPole) {
		const [wx, wy] = toWorld(e.clientX, e.clientY);
		const hitR = 12 / viewScale;
		let overPole = null;
		// Check 0° marker
		const { eqRef } = getEquatorAndMeridian();
		if (eqRef) {
			const zeroPos = getDirectionPositions2D(eqRef, currentLayout);
			for (const pos of zeroPos) { if (Math.hypot(wx - pos.x, wy - pos.y) < hitR) { overPole = '0'; break; } }
		}
		if (!overPole) {
			const nPos = getPolePositions2D(currentLayout.northPole, currentLayout);
			for (const pos of nPos) { if (Math.hypot(wx - pos.x, wy - pos.y) < hitR) { overPole = 'N'; break; } }
		}
		if (!overPole) {
			const sPos = getPolePositions2D(currentLayout.southPole, currentLayout);
			for (const pos of sPos) { if (Math.hypot(wx - pos.x, wy - pos.y) < hitR) { overPole = 'S'; break; } }
		}
		if (overPole) {
			tooltip.style.display = 'block';
			tooltip.style.left = (e.clientX + 14) + 'px';
			tooltip.style.top = (e.clientY + 14) + 'px';
			tooltip.innerHTML = overPole === '0' ? 'Edit null meridian'
				: `Edit ${overPole === 'N' ? 'North' : 'South'} pole`;
			canvas.style.cursor = 'pointer';
		} else {
			tooltip.style.display = 'none';
			canvas.style.cursor = 'default';
		}
	} else {
		tooltip.style.display = 'none';
		canvas.style.cursor = 'default';
	}
});

canvas.addEventListener('mouseleave', () => {
	hoveredEdge = null;
	hoveredFace = -1;
	hoveredSnap = null;
	tooltip.style.display = 'none';
	canvas.style.cursor = 'default';
	draw();
});

// ── Click handler ──
canvas.addEventListener('click', e => {
	if (!currentLayout || !geo) return;
	const N = geo.nFaces;

	// ── Click on existing pole marker or 0° marker to toggle edit ──
	if (!glueTabMode && currentLayout.northPole) {
		const [wx, wy] = toWorld(e.clientX, e.clientY);
		const clickR = 12 / viewScale;
		// Check 0° marker first
		const { eqRef } = getEquatorAndMeridian();
		if (eqRef) {
			const zeroPos = getDirectionPositions2D(eqRef, currentLayout);
			for (const pos of zeroPos) {
				if (Math.hypot(wx - pos.x, wy - pos.y) < clickR) {
					toggleMeridianEdit(); return;
				}
			}
		}
		const nPositions = getPolePositions2D(currentLayout.northPole, currentLayout);
		for (const pos of nPositions) {
			if (Math.hypot(wx - pos.x, wy - pos.y) < clickR) {
				togglePoleEdit('north'); return;
			}
		}
		const sPositions = getPolePositions2D(currentLayout.southPole, currentLayout);
		for (const pos of sPositions) {
			if (Math.hypot(wx - pos.x, wy - pos.y) < clickR) {
				togglePoleEdit('south'); return;
			}
		}
	}

	// ── Meridian edit click ──
	if (merEditMode && hoveredSnap) {
		const axis = poleDir(currentLayout.northPole);
		if (axis) {
			const snapDir = hoveredSnap.type === 'center' ? geo.c3[hoveredSnap.face]
				: vertexMap.dirs[hoveredSnap.vertexId];
			// Project snap direction onto equatorial plane
			const proj = sub3(snapDir, scale3(axis, dot3(snapDir, axis)));
			const pl = Math.sqrt(dot3(proj, proj));
			if (pl > 1e-6) {
				undoStack.push(cloneLayout(currentLayout));
				redoStack.length = 0;
				historyIndex++;
				history.pushState({ idx: historyIndex }, '');
				const target = scale3(proj, 1 / pl);
				// Compute angle from default ref
				let ref = [1, 0, 0];
				if (Math.abs(dot3(axis, ref)) > 0.9) ref = [0, 0, 1];
				let eqRef = sub3(ref, scale3(axis, dot3(ref, axis)));
				eqRef = norm3(eqRef);
				const perp = norm3(cross3(axis, eqRef));
				currentLayout.lonOffset = Math.atan2(dot3(target, perp), dot3(target, eqRef));
				draw();
			}
		}
		return;
	}
	if (merEditMode && !hoveredSnap) {
		exitPoleEditMode();
		draw();
		return;
	}

	// ── Pole edit click ──
	if (poleEditMode && hoveredSnap) {
		undoStack.push(cloneLayout(currentLayout));
		redoStack.length = 0;
		historyIndex++;
		history.pushState({ idx: historyIndex }, '');
		const pole = hoveredSnap.type === 'center'
			? { type: 'center', face: hoveredSnap.face }
			: { type: 'vertex', vertexId: hoveredSnap.vertexId, dir: vertexMap.dirs[hoveredSnap.vertexId] };
		const anti = findAntipode(pole);
		if (poleEditMode === 'north') {
			currentLayout.northPole = pole;
			currentLayout.southPole = anti;
		} else {
			currentLayout.southPole = pole;
			currentLayout.northPole = anti;
		}
		updatePoleLabels();
		draw();
		return;
	}
	if (poleEditMode && !hoveredSnap) {
		exitPoleEditMode();
		draw();
		return;
	}

	if (!hoveredEdge) return;
	if (glueTabMode) {
		if (!hoveredEdge.isCutEdge) return;
		undoStack.push(cloneLayout(currentLayout));
		redoStack.length = 0;
		historyIndex++;
		history.pushState({ idx: historyIndex }, '');
		const key = edgeKey(hoveredEdge.face, hoveredEdge.targetFace);
		const owner = tabOwnership[key] !== undefined ? tabOwnership[key] : Math.min(hoveredEdge.face, hoveredEdge.targetFace);
		tabOwnership[key] = owner === hoveredEdge.face ? hoveredEdge.targetFace : hoveredEdge.face;
		optimizeAndApplyRotation(currentLayout);
		draw();
		return;
	}
	undoStack.push(cloneLayout(currentLayout));
	redoStack.length = 0;
	historyIndex++;
	history.pushState({ idx: historyIndex }, '');
	const { face, targetFace } = hoveredEdge;
	reparent(currentLayout, face, targetFace);
	optimizeAndApplyRotation(currentLayout);
	hoveredEdge = null;
	tooltip.style.display = 'none';
	draw();
});

// ═══════════════════════════════════════════════════════════════════════
// Undo / Redo
// ═══════════════════════════════════════════════════════════════════════

function restoreFromSnapshot(snapshot) {
	if (snapshot.tabOwnershipSnapshot) tabOwnership = snapshot.tabOwnershipSnapshot;
}

function performUndo() {
	if (undoStack.length === 0) return;
	redoStack.push(cloneLayout(currentLayout));
	currentLayout = undoStack.pop();
	restoreFromSnapshot(currentLayout);
	hoveredEdge = null; hoveredFace = -1; tooltip.style.display = 'none';
	updatePoleLabels();
	draw();
}

function performRedo() {
	if (redoStack.length === 0) return;
	undoStack.push(cloneLayout(currentLayout));
	currentLayout = redoStack.pop();
	restoreFromSnapshot(currentLayout);
	hoveredEdge = null; hoveredFace = -1; tooltip.style.display = 'none';
	updatePoleLabels();
	draw();
}

window.addEventListener('popstate', e => {
	const newIdx = (e.state && e.state.idx) || 0;
	if (newIdx < historyIndex) performUndo();
	else if (newIdx > historyIndex) performRedo();
	historyIndex = newIdx;
});

window.addEventListener('keydown', e => {
	if (e.ctrlKey && e.key === 'z') { e.preventDefault(); history.back(); }
	if (e.ctrlKey && e.key === 'y') { e.preventDefault(); history.forward(); }
	if (e.key === 'Escape' && poleEditMode) { exitPoleEditMode(); draw(); }
});

// ═══════════════════════════════════════════════════════════════════════
// UI Controls
// ═══════════════════════════════════════════════════════════════════════

// ── Geometry selector (sorted by face count) ──
for (const key of Object.keys(GEOMETRIES).sort((a, b) => GEOMETRIES[a].nFaces - GEOMETRIES[b].nFaces)) {
	const opt = document.createElement('option');
	opt.value = key;
	opt.textContent = GEOMETRIES[key].name;
	geoSelect.appendChild(opt);
}

function populatePresets() {
	presetSelect.innerHTML = '';
	if (!geo) return;
	geo.presets.forEach((p, i) => {
		const opt = document.createElement('option');
		opt.value = i;
		opt.textContent = p.label;
		presetSelect.appendChild(opt);
	});
	const customs = loadCustomLayouts();
	for (const key of Object.keys(customs)) {
		const opt = document.createElement('option');
		opt.value = key;
		const c = customs[key];
		const dims = (c.width && c.height) ? ` (${c.width}×${c.height})` : '';
		opt.textContent = (c.label || key) + dims;
		presetSelect.appendChild(opt);
	}
}

function populatePaperFormats() {
	paperFmt.innerHTML = '';
	PAPER_FORMATS.forEach((p, i) => {
		const opt = document.createElement('option');
		opt.value = i;
		opt.textContent = p.label;
		paperFmt.appendChild(opt);
	});
}

function switchGeometry(geoId) {
	geo = GEOMETRIES[geoId];
	if (!geo) return;
	undoStack.length = 0;
	redoStack.length = 0;
	historyIndex = 0;
	history.replaceState({ idx: 0 }, '');
	tabOwnership = {};
	currentLayout = null;
	hoveredEdge = null;
	hoveredFace = -1;
	hoveredSnap = null;
	boundaryEdges = [];
	vertexMap = null;
	exitPoleEditMode();
	populatePresets();
	if (geo.presets.length > 0) {
		presetSelect.value = '0';
		computeLayout();
	}
}

geoSelect.addEventListener('change', () => switchGeometry(geoSelect.value));
presetSelect.addEventListener('change', computeLayout);

paperFmt.addEventListener('change', () => {
	// Select matching preset for chosen paper format
	if (geo) {
		const fmtLabel = PAPER_FORMATS[paperFmt.value]?.label || '';
		const isDIN = fmtLabel.startsWith('DIN ');
		let bestIdx = -1;
		for (let i = 0; i < geo.presets.length; i++) {
			const pl = geo.presets[i].label;
			if (isDIN && pl.startsWith('DIN ')) { bestIdx = i; break; }
			if (!isDIN && fmtLabel.startsWith(pl.split(' (')[0])) { bestIdx = i; break; }
		}
		if (bestIdx >= 0) {
			presetSelect.value = bestIdx;
			computeLayout();
			return;
		}
	}
	updateDeleteBtnVisibility();
	if (currentLayout) {
		optimizeAndApplyRotation(currentLayout);
		draw();
	}
});

orientationSelect.addEventListener('change', () => {
	if (currentLayout) {
		optimizeAndApplyRotation(currentLayout);
		draw();
	}
});

marginSlider.addEventListener('input', () => {
	marginVal.textContent = marginSlider.value + ' mm';
	if (currentLayout) {
		optimizeAndApplyRotation(currentLayout);
		draw();
	}
});

// ── Flip ──
function flipLayout(axis) {
	if (!currentLayout || !geo) return;
	const { res, placed } = currentLayout;
	for (let i = 0; i < geo.nFaces; i++) {
		if (!placed[i]) continue;
		if (axis === 'h') {
			res[i].x = -res[i].x;
			res[i].r = geo.irregularFace ? -res[i].r : (Math.PI - res[i].r);
		} else {
			res[i].y = -res[i].y;
			res[i].r = geo.irregularFace ? (Math.PI - res[i].r) : -res[i].r;
		}
	}
	currentLayout.mirrored = !currentLayout.mirrored;
	currentLayout.angle = 0;
	if (currentLayout.lonOffset) currentLayout.lonOffset = -currentLayout.lonOffset;
	rebuildVertexMap();
	// Re-resolve poles for new mirrored state
	if (currentLayout.northPole) currentLayout.northPole = resolvePole(serializePole(currentLayout.northPole));
	if (currentLayout.southPole) currentLayout.southPole = resolvePole(serializePole(currentLayout.southPole));
	optimizeAndApplyRotation(currentLayout);
	updatePoleLabels();
	draw();
}
document.getElementById('btn-flip-h').addEventListener('click', () => flipLayout('h'));
document.getElementById('btn-flip-v').addEventListener('click', () => flipLayout('v'));

// ── Glue tab mode ──
document.getElementById('btn-glue-tab').addEventListener('click', () => {
	glueTabMode = !glueTabMode;
	if (glueTabMode) exitPoleEditMode();
	const btn = document.getElementById('btn-glue-tab');
	btn.style.background = glueTabMode ? '#a06000' : '';
	btn.style.color = glueTabMode ? '#fff' : '';
	btn.style.borderColor = glueTabMode ? '#c80' : '';
	hoveredEdge = null; hoveredFace = -1; tooltip.style.display = 'none';
	draw();
});

// ── Pole edit mode ──
function exitPoleEditMode() {
	poleEditMode = null;
	merEditMode = false;
	hoveredSnap = null;
	const btnN = document.getElementById('btn-edit-north');
	const btnS = document.getElementById('btn-edit-south');
	const btnM = document.getElementById('btn-edit-meridian');
	btnN.style.background = ''; btnN.style.color = ''; btnN.style.borderColor = '';
	btnS.style.background = ''; btnS.style.color = ''; btnS.style.borderColor = '';
	btnM.style.background = ''; btnM.style.color = ''; btnM.style.borderColor = '';
}

function togglePoleEdit(which) {
	if (poleEditMode === which && !merEditMode) {
		exitPoleEditMode();
	} else {
		glueTabMode = false;
		merEditMode = false;
		const gBtn = document.getElementById('btn-glue-tab');
		gBtn.style.background = ''; gBtn.style.color = ''; gBtn.style.borderColor = '';
		poleEditMode = which;
		hoveredSnap = null;
		const btnN = document.getElementById('btn-edit-north');
		const btnS = document.getElementById('btn-edit-south');
		const btnM = document.getElementById('btn-edit-meridian');
		btnN.style.background = which === 'north' ? '#8b0000' : '';
		btnN.style.color = which === 'north' ? '#fff' : '';
		btnN.style.borderColor = which === 'north' ? '#c44' : '';
		btnS.style.background = which === 'south' ? '#003080' : '';
		btnS.style.color = which === 'south' ? '#fff' : '';
		btnS.style.borderColor = which === 'south' ? '#48c' : '';
		btnM.style.background = ''; btnM.style.color = ''; btnM.style.borderColor = '';
	}
	hoveredEdge = null; hoveredFace = -1; tooltip.style.display = 'none';
	draw();
}

function toggleMeridianEdit() {
	if (merEditMode) {
		exitPoleEditMode();
	} else {
		glueTabMode = false;
		poleEditMode = null;
		merEditMode = true;
		hoveredSnap = null;
		const gBtn = document.getElementById('btn-glue-tab');
		gBtn.style.background = ''; gBtn.style.color = ''; gBtn.style.borderColor = '';
		const btnN = document.getElementById('btn-edit-north');
		const btnS = document.getElementById('btn-edit-south');
		const btnM = document.getElementById('btn-edit-meridian');
		btnN.style.background = ''; btnN.style.color = ''; btnN.style.borderColor = '';
		btnS.style.background = ''; btnS.style.color = ''; btnS.style.borderColor = '';
		btnM.style.background = '#806000'; btnM.style.color = '#fff'; btnM.style.borderColor = '#c90';
	}
	hoveredEdge = null; hoveredFace = -1; tooltip.style.display = 'none';
	draw();
}

document.getElementById('btn-edit-north').addEventListener('click', () => togglePoleEdit('north'));
document.getElementById('btn-edit-south').addEventListener('click', () => togglePoleEdit('south'));
document.getElementById('btn-edit-meridian').addEventListener('click', toggleMeridianEdit);

// ── Clipboard ──
document.getElementById('btn-export-clip').addEventListener('click', () => {
	if (!currentLayout || !geo) return;
	const data = {
		geometry: geo.id,
		label: presetSelect.options[presetSelect.selectedIndex]?.textContent || '',
		parents: currentLayout.parent,
		tabs: cloneTabOwnership(),
		mirrored: currentLayout.mirrored || false,
		angle: currentLayout.angle || 0,
		aspect: getEffectiveAspect(),
		lonOffset: currentLayout.lonOffset || 0,
		northPole: serializePole(currentLayout.northPole),
		southPole: serializePole(currentLayout.southPole)
	};
	navigator.clipboard.writeText(JSON.stringify(data)).then(() => {
		const btn = document.getElementById('btn-export-clip');
		btn.textContent = '✅ Copied!';
		setTimeout(() => btn.textContent = '📋 Copy', 1500);
	});
});

document.getElementById('btn-import-clip').addEventListener('click', async () => {
	const btn = document.getElementById('btn-import-clip');
	if (!geo) return;
	try {
		const text = await navigator.clipboard.readText();
		const data = JSON.parse(text);
		let pp, tabs = {}, mirrored = false, label = '';
		if (Array.isArray(data) && data.length === geo.nFaces) {
			pp = data;
		} else if (data.parents && Array.isArray(data.parents)) {
			pp = data.parents;
			if (data.tabs) tabs = data.tabs;
			if (data.mirrored) mirrored = true;
			if (data.label || data.name) label = data.label || data.name;
		} else throw new Error('Invalid format');
		if (pp.length !== geo.nFaces) throw new Error(`Expected ${geo.nFaces} parents, got ${pp.length}`);
		const seed = pp.indexOf(-1);
		const layout = guidedUnfold(seed, pp);
		layout.seed = seed;
		layout.mirrored = mirrored;
		layout.label = label;
		undoStack.push(cloneLayout(currentLayout));
		redoStack.length = 0;
		historyIndex++;
		history.pushState({ idx: historyIndex }, '');
		tabOwnership = tabs;
		currentLayout = layout;
		rebuildVertexMap();
		layout.northPole = data.northPole ? resolvePole(data.northPole) : null;
		layout.southPole = data.southPole ? resolvePole(data.southPole) : null;
		layout.lonOffset = data.lonOffset || 0;
		optimizeAndApplyRotation(currentLayout);
		hoveredEdge = null; hoveredFace = -1;
		updateDeleteBtnVisibility();
		updatePoleLabels();
		draw();
		btn.textContent = '✅ Loaded!';
		setTimeout(() => btn.textContent = '📥 Paste', 1500);
	} catch (e) {
		btn.textContent = '❌ Failed';
		setTimeout(() => btn.textContent = '📥 Paste', 1500);
		console.error('Import failed:', e);
	}
});

// ── Custom layout management ──
function updateDeleteBtnVisibility() {
	const customs = loadCustomLayouts();
	document.getElementById('btn-delete-custom').style.display =
		customs[presetSelect.value] ? '' : 'none';
}

document.getElementById('btn-save-custom').addEventListener('click', () => {
	if (!currentLayout || !geo) return;
	const name = prompt('Layout name:', currentLayout.label || '');
	if (!name) return;
	const sizeStr = prompt('Paper size (width × height in mm, e.g. 297x210):');
	if (!sizeStr) return;
	const parts = sizeStr.split(/[x×,\s]+/).map(Number).filter(n => n > 0);
	if (parts.length < 2) { alert('Invalid size. Use e.g. 297x210'); return; }
	const w = Math.max(parts[0], parts[1]), h = Math.min(parts[0], parts[1]);
	const aspect = w / h;
	const key = 'custom_' + Date.now();
	const customs = loadCustomLayouts();
	customs[key] = {
		label: name, width: parts[0], height: parts[1], aspect,
		parents: currentLayout.parent.slice(),
		tabs: cloneTabOwnership(),
		mirrored: currentLayout.mirrored || false,
		angle: currentLayout.angle || 0,
		northPole: serializePole(currentLayout.northPole),
		southPole: serializePole(currentLayout.southPole)
	};
	saveCustomLayouts(customs);
	currentLayout.label = name;
	populatePresets();
	presetSelect.value = key;
	optimizeAndApplyRotation(currentLayout);
	updateDeleteBtnVisibility();
	draw();
});

document.getElementById('btn-delete-custom').addEventListener('click', () => {
	const key = presetSelect.value;
	const customs = loadCustomLayouts();
	if (!customs[key]) return;
	const name = customs[key].label || key;
	if (!confirm('Delete custom layout "' + name + '"?')) return;
	delete customs[key];
	saveCustomLayouts(customs);
	populatePresets();
	presetSelect.value = '0';
	updateDeleteBtnVisibility();
	computeLayout();
});

window.addEventListener('resize', () => { if (currentLayout) draw(); });

// ═══════════════════════════════════════════════════════════════════════
// Initialization
// ═══════════════════════════════════════════════════════════════════════

// Support ?geo=xxx URL parameter
const urlParams = new URLSearchParams(window.location.search);
const geoParam = urlParams.get('geo');
if (geoParam && GEOMETRIES[geoParam]) {
	geoSelect.value = geoParam;
}

populatePaperFormats();
history.replaceState({ idx: 0 }, '');
switchGeometry(geoSelect.value);
</script>
